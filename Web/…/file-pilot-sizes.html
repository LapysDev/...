<body style="margin: 0">
  <img id=image src="file:///C:/Users/oluwa/Pictures/Screenshots/14307.png"/>
  <script async>
    var canvas = document.createElement("canvas");
    var context = canvas.getContext("2d");
    var image   = new Image() || document.getElementById("image");

    // ...
    // image.src = "file:///C:/Users/oluwa/Pictures/Screenshots/14307.png";

    canvas.style.setProperty("border", "1px solid white");
    canvas.style.setProperty("box-sizing", "content-box");
    canvas.style.setProperty("height", (canvas.height = 1526) + "px");
    canvas.style.setProperty("left", "0");
    canvas.style.setProperty("position", "absolute");
    canvas.style.setProperty("width", (canvas.width = 2559) + "px");
    canvas.style.setProperty("top", "0");

    (document.body || document.documentElement).appendChild(canvas);
    image.addEventListener("load", draw);
    setTimeout(draw, 1.0e3);

    function draw() {
      var total = 0.0, sizes = [
        // [(6.4 * 1024 * 1024), (2.9 * 1024 * 1024), (2.9 * 1024 * 1024), (1.4 * 1024 * 1024), (2.9 * 1024 * 1024), (2.9 * 1024 * 1024), (269.7 * 1024), (2.9 * 1024 * 1024), (2.9 * 1024 * 1024), (240.7 * 1024), (261.5 * 1024), (2.9 * 1024 * 1024)]
        //
        // [(1.8 * 1024), (27.7 * 1024), (131 * 1), (539 * 1), (3.5 * 1024), (62 * 1), (450 * 1), (660 * 1), (713 * 1), (1.1 * 1024), (1.5 * 1024), (1.1 * 1024)],
        // [(2.1 * 1024), (205.2 * 1024), (20.8 * 1024), (5.7 * 1024), (728 * 1), (1.7 * 1024), (1.6 * 1024), (582 * 1), (172 * 1), (553 * 1), (547 * 1), (136 * 1)],
        // [(111.7 * 1024), (6 * 1024), (286 * 1), (2.8 * 1024), (785 * 1), (465 * 1), (53 * 1), (6 * 1024), (29 * 1024), (36.5 * 1024), (6 * 1024), (1.5 * 1024)],
        // [(114 * 1), (819 * 1), (15.4 * 1024), (162 * 1), (604 * 1), (37 * 1), (1.1 * 1024), (366 * 1), (3.3 * 1024), (804 * 1), (148 * 1), (1.4 * 1024)],
        // [(2.5 * 1024), (7.4 * 1024), (1 * 1024), (467 * 1), (200 * 1), (512 * 1), (1.2 * 1024), (1.4 * 1024), (19.5 * 1024), (987 * 1), (64.7 * 1024), (82 * 1)]
      ];

      // ...
      context.imageSmoothingEnabled = false;
      context.imageSmoothingQuality = "low";
      context.strokeStyle           = "#FFFFFF";

      for (var row    = 0; row    !== sizes.length;      ++row)
      for (var column = 0; column !== sizes[row].length; ++column)
        total += sizes[row][column];

      for (var row    = 0, offsetY = 348; row    !== sizes.length;      ++row)
      for (var column = 0, offsetX = 362; column !== sizes[row].length; ++column) {
        var marginX = 82,                                     marginY = 240;
        var width   = 100,                                    height  = 20;
        var x       = offsetX + (column * (marginX + width)), y       = offsetY + (row * (marginY + height));
        var ratio   = sizes[row][column] / total;

        context.fillStyle = "#252C36";            context.fillRect(x, y, width, height);
        context.fillStyle = "rgba(0, 0, 0, 0.2)"; context.fillRect(x, y, Math.min(width, (width * Math.min(1.0, ratio * 1.25)) + 20), height);
        context.fillStyle = "dodgerblue";         context.fillRect(x, y, width * ratio, height);
        context.strokeRect(x, y, width, height)
      }

      draw = function() {}
    }
  </script>
</body>
