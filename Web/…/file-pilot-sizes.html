        context.fillStyle = "rgba(0, 0, 0, 0.2)"; context.fillRect(x, y, Math.min(width, (width * Math.min(1.0, ratio * 1.25)) + 20), height);
        context.fillStyle = "dodgerblue";         context.fillRect(x, y, width * ratio, height);
        context.strokeRect(x, y, width, height)
      }

      draw = function() {}
    }
  </script>
</body>
